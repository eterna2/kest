name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (Python 3.11 with Extras)
        if: matrix.python-version == '3.11'
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}

      - name: Install dependencies (Other Python versions, No Extras)
        if: matrix.python-version != '3.11'
        run: uv sync --dev --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .

      - name: Test
        run: uv run pytest --cov=src/kest --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          fail_ci_if_error: false

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kest
    permissions:
      id-token: write # Required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Build package
        run: uv build --python 3.11

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # If not using Trusted Publishing (OIDC), uncomment the following line
        # and ensure PYPI_API_TOKEN is set in your GitHub Repository Secrets.
        # with:
        #   password: ${{ secrets.PYPI_API_TOKEN }}
